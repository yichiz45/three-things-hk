<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Three Things — Hong Kong</title>
<meta name="description" content="Three things worth your time in Hong Kong this week. Gathered by algorithm, curated by taste.">

<!-- Open Graph: makes shared links look good in WhatsApp / iMessage / Slack / LinkedIn -->
<meta property="og:title" content="Three Things — Hong Kong">
<meta property="og:description" content="What is actually worth your time in this city this week. Gathered by algorithm, curated by taste. No boring things. Ever.">
<meta property="og:image" content="https://3thingshk.vercel.app/og.png">
<meta property="og:url" content="https://3thingshk.vercel.app">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0b0e14;
    --paper:#f1ede4;
    --ink:#15151a;
    --grey:#6f6a60;
    --hairline:#d8d2c4;
    --led:#ff3b30;
    --dusk-a:#ff9e57;
    --dusk-b:#ff5e8a;
    --dusk-c:#5a6cff;
    --dusk-d:#0fbfa5;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ background:var(--night); }
  body{
    font-family:"Space Mono", ui-monospace, monospace;
    color:var(--ink);
    min-height:100vh;
    padding:clamp(12px,3vw,40px);
    background:
      radial-gradient(120% 60% at 50% 118%,
        rgba(255,94,138,.32), rgba(90,108,255,.18) 42%, transparent 70%),
      var(--night);
  }

  .card{
    max-width:880px; margin:0 auto;
    background:var(--paper);
    border-radius:22px;
    padding:clamp(24px,5vw,56px);
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }

  .topline{
    display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
    font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--grey);
    padding-bottom:18px; border-bottom:1px solid var(--ink);
  }
  .brand{ font-family:"Silkscreen", monospace; font-size:13px; color:var(--ink); }

  .display{
    font-family:"Silkscreen", monospace;
    font-weight:700;
    font-size:clamp(24px,5vw,44px);
    line-height:1.4;
    padding:40px 0 14px;
    text-transform:uppercase;
  }
  .display .route{ color:var(--led); }
  .display .arrow{ animation:blink 1.2s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  @media (prefers-reduced-motion: reduce){
    .display .arrow{ animation:none; }
    .ticket{ animation:none !important; opacity:1 !important; }
  }

  .standfirst{
    font-size:13px; line-height:1.7; color:var(--grey);
    max-width:52ch; padding-bottom:40px;
  }

  /* ---- ticket entry animation ---- */
  .ticket{
    border:1px solid var(--ink);
    border-radius:14px;
    overflow:hidden;
    margin-bottom:26px;
    background:#faf8f2;
    position:relative;
    opacity:0;
    transform:translateY(30px);
    animation:slideIn .5s ease-out forwards;
  }
  .ticket:nth-of-type(1){ animation-delay:.15s; }
  .ticket:nth-of-type(2){ animation-delay:.35s; }
  .ticket:nth-of-type(3){ animation-delay:.55s; }
  @keyframes slideIn{
    to{ opacity:1; transform:translateY(0); }
  }

  .stub{
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:14px 18px;
    font-family:"Silkscreen", monospace;
    font-size:11px; text-transform:uppercase; letter-spacing:.04em;
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .ticket:nth-of-type(1) .stub{ background:linear-gradient(100deg,var(--dusk-a),var(--dusk-b) 55%,var(--dusk-c)); }
  .ticket:nth-of-type(2) .stub{ background:linear-gradient(100deg,var(--dusk-d),var(--dusk-c) 60%,var(--dusk-b)); }
  .ticket:nth-of-type(3) .stub{ background:linear-gradient(100deg,var(--dusk-b),var(--dusk-a) 50%,var(--dusk-d)); }
  .stub .no{ font-size:22px; }

  .ticket-body{
    padding:20px 18px 22px;
    border-top:1px dashed var(--ink);
    position:relative;
  }
  .meta{
    font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--grey); margin-bottom:10px;
  }
  .ticket h2{
    font-size:clamp(18px,3vw,24px); font-weight:700;
    letter-spacing:-.01em; line-height:1.3; margin-bottom:10px;
    padding-right:40px;
  }
  .ticket h2 a{ color:inherit; text-decoration:none; }
  .ticket h2 a:hover, .ticket h2 a:focus-visible{
    background:var(--ink); color:var(--paper);
  }
  .blurb{ font-size:14px; line-height:1.75; max-width:58ch; }

  /* ---- tear-off share tab ---- */
  .share-tab{
    position:absolute; top:0; right:0;
    width:38px; height:100%;
    border:none; background:transparent;
    cursor:pointer;
    border-left:1px dashed var(--hairline);
    display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .share-tab:hover, .share-tab:focus-visible{
    background:rgba(0,0,0,.04);
  }
  .share-tab:active{
    animation:tearPulse .3s ease-out;
  }
  @keyframes tearPulse{
    0%{ transform:translateX(0); }
    30%{ transform:translateX(4px); }
    100%{ transform:translateX(0); }
  }
  .share-tab svg{
    width:16px; height:16px;
    opacity:.35; transition:opacity .15s;
  }
  .share-tab:hover svg{ opacity:.7; }
  .share-tab .tip{
    position:absolute; right:46px; top:50%; transform:translateY(-50%);
    font-size:9px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--grey); white-space:nowrap;
    opacity:0; transition:opacity .15s;
    pointer-events:none;
    font-family:"Space Mono", monospace;
  }
  .share-tab:hover .tip{ opacity:1; }

  /* ---- toast ---- */
  .toast{
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:var(--paper);
    font-size:12px; letter-spacing:.1em; text-transform:uppercase;
    padding:12px 24px; border-radius:8px;
    opacity:0; transition:all .3s ease-out;
    pointer-events:none; z-index:99;
    font-family:"Space Mono", monospace;
  }
  .toast.show{
    opacity:1; transform:translateX(-50%) translateY(0);
  }

  /* overflow weeks */
  .more-head{
    font-family:"Silkscreen", monospace; font-weight:700;
    font-size:15px; text-transform:uppercase; letter-spacing:.04em;
    margin:30px 0 6px;
  }
  .more-head .led{ color:var(--led); }
  .more-list{ list-style:none; }
  .more-list li{
    display:flex; justify-content:space-between; gap:16px; align-items:baseline;
    padding:11px 2px; border-bottom:1px dashed var(--hairline);
    font-size:13px; line-height:1.5;
  }
  .more-list a{ color:var(--ink); text-decoration:none; }
  .more-list a:hover, .more-list a:focus-visible{ color:var(--led); }
  .more-list .v{
    font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--grey); text-align:right; flex-shrink:0;
  }

  footer{
    margin-top:44px; padding-top:18px; border-top:1px solid var(--ink);
    display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
    font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--grey);
  }
  footer a{ color:var(--ink); text-decoration:none; }
  footer a:hover, footer a:focus-visible{ color:var(--led); }
  .barcode{
    height:26px; flex-basis:120px; flex-shrink:0;
    background:repeating-linear-gradient(90deg,
      var(--ink) 0 2px, transparent 2px 4px,
      var(--ink) 4px 7px, transparent 7px 9px,
      var(--ink) 9px 10px, transparent 10px 14px);
    opacity:.85;
  }
  :focus-visible{ outline:2px solid var(--led); outline-offset:3px; }

  /* ---- mobile ---- */
  @media (max-width:600px){
    body{ padding:10px; }
    .card{ border-radius:16px; padding:20px 16px; }
    .topline{ font-size:9px; gap:6px; padding-bottom:14px; }
    .brand{ font-size:11px; }
    .display{ font-size:22px; line-height:1.35; padding:28px 0 10px; }
    .standfirst{ font-size:12px; padding-bottom:28px; }
    .stub{ padding:10px 14px; font-size:9px; }
    .stub .no{ font-size:18px; }
    .ticket-body{ padding:16px 14px 18px; }
    .ticket h2{ font-size:18px; padding-right:36px; }
    .blurb{ font-size:13px; line-height:1.7; }
    .share-tab{ width:32px; }
    .share-tab .tip{ display:none; }
    .more-head{ font-size:13px; }
    .more-list li{ flex-direction:column; gap:2px; padding:10px 2px; }
    .more-list .v{ text-align:left; }
    footer{ font-size:9px; gap:10px; }
    .barcode{ height:20px; flex-basis:80px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="topline">
      <span class="brand">THREE THINGS</span>
      <span>Weekly · N°<span id="issue">—</span></span>
      <span id="week">—</span>
    </div>

    <h1 class="display">
      THREE THINGS <span class="route">→ HONG KONG</span><br>
      THIS WEEK <span class="arrow">→</span>
    </h1>

    <p class="standfirst">What is actually worth your time in this city this week.
    Gathered by algorithm, curated by taste. No boring things. Ever.</p>

    <main id="picks" aria-live="polite"></main>

    <footer>
      <span>CURATED BY <a href="#">A SINGULAR PROJECT</a></span>
      <span>PROJECT BY INNOVA LAB</span>
      <span class="barcode" role="presentation"></span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

<script>
(async () => {
  const main = document.getElementById('picks');
  const toast = document.getElementById('toast');
  let picksData = [];

  try {
    const res = await fetch('picks.json', { cache: 'no-store' });
    const data = await res.json();
    picksData = data.picks || [];

    const d = new Date(data.week_of + 'T00:00:00');
    document.getElementById('week').textContent = isNaN(d) ? data.week_of :
      d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    document.getElementById('issue').textContent = data.issue ?? '—';

    main.innerHTML = data.picks.map((p, i) => `
      <article class="ticket">
        <div class="stub">
          <span>Admit one · This week's pick</span>
          <span class="no">${String(i + 1).padStart(2, '0')}</span>
        </div>
        <div class="ticket-body">
          <p class="meta">${esc(p.venue)}${p.dates ? ' · ' + esc(p.dates) : ''}</p>
          <h2><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></h2>
          <p class="blurb">${esc(p.blurb)}</p>
          <button class="share-tab" data-idx="${i}" aria-label="Share this pick" title="Tear off & share">
            <span class="tip">Tear & share</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </button>
        </div>
      </article>`).join('');

    if (Array.isArray(data.more) && data.more.length) {
      main.insertAdjacentHTML('beforeend', `
        <section>
          <h2 class="more-head">Actually, this week there${data.more.length === 1 ? "'s" : " are"} more <span class="led">→</span></h2>
          <ul class="more-list">
            ${data.more.map(m => `
              <li>
                <a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.title)}</a>
                <span class="v">${esc(m.venue)}${m.dates ? ' · ' + esc(m.dates) : ''}</span>
              </li>`).join('')}
          </ul>
        </section>`);
    }

    // Share handlers
    main.addEventListener('click', async (e) => {
      const btn = e.target.closest('.share-tab');
      if (!btn) return;
      const pick = picksData[btn.dataset.idx];
      if (!pick) return;

      const text = `${pick.title} — ${pick.blurb}\n→ ${pick.url}`;
      const shareData = {
        title: pick.title,
        text: `${pick.title} — ${pick.blurb}`,
        url: pick.url,
      };

      if (navigator.share) {
        try { await navigator.share(shareData); } catch {}
      } else {
        try {
          await navigator.clipboard.writeText(text);
          showToast('Copied — paste anywhere');
        } catch {
          showToast('Could not copy');
        }
      }
    });

  } catch (e) {
    main.innerHTML = '<p class="blurb">This week\u2019s picks are on their way. Check back shortly.</p>';
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function esc(s){ return String(s ?? '').replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
})();
</script>
</body>
</html>
