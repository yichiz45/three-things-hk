# Event sources. Three types:
#   jsonld — pages embedding schema.org Event data in <script type="application/ld+json">
#   ics    — calendar subscription feeds
#   rss    — news/event RSS feeds (parsed loosely, title + link + date)
#
# Start small. Add a source only after the first three run cleanly.

sources:
  # - name: M+
  #   type: jsonld
  #   url: https://www.mplus.org.hk/en/exhibitions/
  #   venue: "M+, West Kowloon"
  #   # No JSON-LD on listing or detail pages (sitemap has exhibition URLs, but
  #   # detail pages ship no schema.org data). Revisit if M+ adds structured data.

  - name: Tai Kwun
    type: taikwun
    url: https://www.taikwun.hk/en/programme
    venue: "Tai Kwun, Central"

  - name: Hong Kong Palace Museum
    type: hkpm
    url: https://www.hkpm.org.hk/en/exhibition
    venue: "HKPM, West Kowloon"

  - name: Hong Kong Museum of Art
    type: hkma
    url: https://hk.art.museum/en/web/ma/exhibitions-and-events.html
    venue: "HKMA, Tsim Sha Tsui"

